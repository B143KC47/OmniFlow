<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniFlow - AI流程编辑器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/drawflow@0.0.59/dist/drawflow.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/drawflow@0.0.59/dist/drawflow.min.css" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <div class="logo">
                <i class="fas fa-project-diagram"></i>
                OmniFlow
            </div>
            <div class="actions">
                <button id="btn-new" title="新建流程"><i class="fas fa-file"></i> 新建</button>
                <button id="btn-save" title="保存流程"><i class="fas fa-save"></i> 保存</button>
                <button id="btn-load" title="加载流程"><i class="fas fa-folder-open"></i> 加载</button>
                <button id="btn-export" title="导出流程"><i class="fas fa-file-export"></i> 导出</button>
                <button id="btn-run" title="运行流程" class="btn-accent"><i class="fas fa-play"></i> 运行</button>
                <button id="btn-settings" title="设置"><i class="fas fa-cog"></i></button>
                <button class="theme-toggle" id="theme-toggle" title="切换主题">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
        
        <div class="content">
            <div class="sidebar">
                <div class="sidebar-header">
                    节点库
                    <button class="sidebar-toggle" title="收起/展开侧边栏">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                </div>
                
                <div class="node-categories">
                    <div class="category-title">
                        <i class="fas fa-play-circle"></i> 流程控制
                    </div>
                    <div class="node-list">
                        <div class="node" draggable="true" data-node-type="flowStart">
                            <div class="node-icon"><i class="fas fa-play"></i></div>
                            <div class="node-label">Flow开始</div>
                        </div>
                        <div class="node" draggable="true" data-node-type="flowEnd">
                            <div class="node-icon"><i class="fas fa-stop"></i></div>
                            <div class="node-label">Flow结束</div>
                        </div>
                    </div>
                </div>
                
                <div class="node-categories">
                    <div class="category-title">
                        <i class="fas fa-robot"></i> AI节点
                    </div>
                    <div class="node-list">
                        <div class="node" draggable="true" data-node-type="llmResponse">
                            <div class="node-icon"><i class="fas fa-brain"></i></div>
                            <div class="node-label">大语言模型</div>
                        </div>
                        <div class="node" draggable="true" data-node-type="webSearch">
                            <div class="node-icon"><i class="fas fa-search"></i></div>
                            <div class="node-label">上网搜索</div>
                        </div>
                    </div>
                </div>
                
                <div class="node-categories">
                    <div class="category-title">
                        <i class="fas fa-exchange-alt"></i> 输入输出
                    </div>
                    <div class="node-list">
                        <div class="node" draggable="true" data-node-type="userInput">
                            <div class="node-icon"><i class="fas fa-keyboard"></i></div>
                            <div class="node-label">用户输入</div>
                        </div>
                        <div class="node" draggable="true" data-node-type="textOutput">
                            <div class="node-icon"><i class="fas fa-comment"></i></div>
                            <div class="node-label">文本输出</div>
                        </div>
                        <div class="node" draggable="true" data-node-type="thinkOutput">
                            <div class="node-icon"><i class="fas fa-lightbulb"></i></div>
                            <div class="node-label">思考输出</div>
                        </div>
                    </div>
                </div>
                
                <div class="node-categories">
                    <div class="category-title">
                        <i class="fas fa-code-branch"></i> 控制节点
                    </div>
                    <div class="node-list">
                        <div class="node" draggable="true" data-node-type="condition">
                            <div class="node-icon"><i class="fas fa-question"></i></div>
                            <div class="node-label">条件判断</div>
                        </div>
                        <div class="node" draggable="true" data-node-type="switch">
                            <div class="node-icon"><i class="fas fa-random"></i></div>
                            <div class="node-label">多路选择</div>
                        </div>
                    </div>
                </div>
                
                <div class="node-categories">
                    <div class="category-title">
                        <i class="fas fa-cog"></i> 数据处理
                    </div>
                    <div class="node-list">
                        <div class="node" draggable="true" data-node-type="textProcess">
                            <div class="node-icon"><i class="fas fa-font"></i></div>
                            <div class="node-label">文本处理</div>
                        </div>
                        <div class="node" draggable="true" data-node-type="variable">
                            <div class="node-icon"><i class="fas fa-cube"></i></div>
                            <div class="node-label">变量设置</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="editor-container">
                <div class="editor-toolbar">
                    <div class="toolbar-group">
                        <button id="btn-zoom-in" title="放大"><i class="fas fa-search-plus"></i></button>
                        <button id="btn-zoom-out" title="缩小"><i class="fas fa-search-minus"></i></button>
                        <button id="btn-zoom-reset" title="重置缩放"><i class="fas fa-expand"></i></button>
                    </div>
                    <div class="toolbar-group">
                        <button id="btn-select-all" title="全选"><i class="fas fa-object-group"></i></button>
                        <button id="btn-delete" title="删除所选"><i class="fas fa-trash-alt"></i></button>
                        <button id="btn-lock" title="锁定/解锁所选"><i class="fas fa-lock"></i></button>
                    </div>
                    <div class="toolbar-group">
                        <button id="btn-undo" title="撤销"><i class="fas fa-undo"></i></button>
                        <button id="btn-redo" title="重做"><i class="fas fa-redo"></i></button>
                    </div>
                </div>
                <div id="drawflow"></div>
                <div class="status-bar">
                    <div id="position-info">位置: 0, 0</div>
                    <div id="zoom-info">缩放: 100%</div>
                    <div id="selected-info">已选择: 0 个节点</div>
                </div>
            </div>
        </div>
        
        <!-- 聊天测试面板 -->
        <div id="chat-panel" class="chat-panel">
            <div class="chat-header">
                <h3>对话测试</h3>
                <button id="chat-toggle" class="chat-toggle">
                    <i class="fas fa-chevron-down"></i>
                </button>
            </div>
            <div class="chat-container">
                <div id="chat-messages" class="chat-messages"></div>
                <div class="chat-input-container">
                    <input type="text" id="chat-input" placeholder="输入消息...">
                    <button id="chat-send">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 保存对话框 -->
    <div id="save-dialog" class="dialog">
        <div class="dialog-header">
            <h3>保存流程</h3>
            <span class="close" id="save-close">&times;</span>
        </div>
        <div class="dialog-content">
            <div class="form-group">
                <div class="node-property-label">流程名称</div>
                <input type="text" id="flow-name" placeholder="输入流程名称">
            </div>
            <div class="form-group">
                <div class="node-property-label">流程描述 (可选)</div>
                <textarea id="flow-description" placeholder="描述此流程的用途..." rows="3"></textarea>
            </div>
        </div>
        <div class="dialog-buttons">
            <button id="save-cancel" class="btn-secondary">取消</button>
            <button id="save-confirm" class="btn-primary">保存</button>
        </div>
    </div>

    <!-- 加载对话框 -->
    <div id="load-dialog" class="dialog">
        <div class="dialog-header">
            <h3>加载流程</h3>
            <span class="close" id="load-close">&times;</span>
        </div>
        <div class="dialog-content">
            <div class="form-group">
                <div class="node-property-label">选择流程</div>
                <div id="flow-list"></div>
            </div>
        </div>
        <div class="dialog-buttons">
            <button id="load-cancel" class="btn-secondary">取消</button>
            <button id="load-confirm" class="btn-primary" disabled>加载</button>
        </div>
    </div>
    
    <!-- 节点编辑对话框 -->
    <div id="node-edit-dialog" class="dialog">
        <div class="dialog-header">
            <h3 id="node-edit-title">编辑节点</h3>
            <span class="close" id="node-edit-close">&times;</span>
        </div>
        <div class="dialog-content" id="node-edit-content">
            <!-- 动态内容 -->
        </div>
        <div class="dialog-buttons">
            <button id="node-edit-cancel" class="btn-secondary">取消</button>
            <button id="node-edit-confirm" class="btn-primary">应用</button>
        </div>
    </div>
    
    <!-- 设置对话框 -->
    <div id="settings-dialog" class="dialog">
        <div class="dialog-header">
            <h3>设置</h3>
            <span class="close" id="settings-close">&times;</span>
        </div>
        <div class="dialog-content">
            <div class="form-group">
                <div class="node-property-label">主题</div>
                <select id="theme-select">
                    <option value="light">浅色</option>
                    <option value="dark">深色</option>
                    <option value="auto">跟随系统</option>
                </select>
            </div>
            <div class="form-group">
                <div class="node-property-label">网格大小</div>
                <input type="range" id="grid-size" min="10" max="40" step="5" value="20">
                <div id="grid-size-value">20</div>
            </div>
            <div class="form-group">
                <div class="node-property-label">API密钥设置</div>
                <input type="password" id="api-key" placeholder="输入LLM API密钥">
            </div>
        </div>
        <div class="dialog-buttons">
            <button id="settings-cancel" class="btn-secondary">取消</button>
            <button id="settings-confirm" class="btn-primary">应用</button>
        </div>
    </div>
    
    <!-- 运行结果对话框 -->
    <div id="run-result-dialog" class="dialog">
        <div class="dialog-header">
            <h3>流程运行结果</h3>
            <span class="close" id="run-result-close">&times;</span>
        </div>
        <div class="dialog-content">
            <div id="run-result-content" class="run-result-content"></div>
            <div id="run-log" class="run-log"></div>
        </div>
        <div class="dialog-buttons">
            <button id="run-result-close-btn" class="btn-primary">关闭</button>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/themes.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
