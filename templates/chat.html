<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniFlow - 聊天界面</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .chat-container {
            height: calc(100vh - 160px);
            display: flex;
            flex-direction: column;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 5px 5px 0 0;
        }
        
        .message {
            margin-bottom: 15px;
            max-width: 80%;
        }
        
        .user-message {
            margin-left: auto;
            background-color: #d1ecf1;
            border-radius: 15px 15px 0 15px;
            padding: 10px 15px;
        }
        
        .system-message {
            margin-right: auto;
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 15px 15px 15px 0;
            padding: 10px 15px;
        }
        
        .message-time {
            font-size: 0.75rem;
            color: #6c757d;
            display: block;
            margin-top: 5px;
        }
        
        .chat-input {
            padding: 15px;
            background-color: white;
            border: 1px solid #dee2e6;
            border-top: none;
            border-radius: 0 0 5px 5px;
        }
        
        .typing-indicator {
            padding: 10px;
            display: none;
        }
        
        .typing-indicator span {
            height: 8px;
            width: 8px;
            margin: 0 1px;
            background-color: #3498db;
            display: inline-block;
            border-radius: 50%;
            animation: typing 1.4s infinite both;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0% {
                opacity: 0.4;
                transform: translateY(0);
            }
            50% {
                opacity: 1;
                transform: translateY(-5px);
            }
            100% {
                opacity: 0.4;
                transform: translateY(0);
            }
        }
        
        .message-type-selector .btn {
            border-radius: 20px;
            margin-right: 5px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">OmniFlow</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="bi bi-house"></i> 首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/node-editor"><i class="bi bi-diagram-3"></i> 流程编辑器</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/chat"><i class="bi bi-chat-dots"></i> 聊天界面</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/settings"><i class="bi bi-gear"></i> 系统设置</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-9">
                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages">
                        <div class="message system-message">
                            <div>欢迎使用OmniFlow聊天界面！我是OmniFlow助手，请问有什么可以帮到您？</div>
                            <span class="message-time">今天 12:00</span>
                        </div>
                    </div>
                    
                    <div class="typing-indicator" id="typingIndicator">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    
                    <div class="chat-input">
                        <div class="mb-2 message-type-selector">
                            <div class="btn-group" role="group">
                                <button type="button" class="btn btn-sm btn-outline-primary active" data-message-type="text">
                                    <i class="bi bi-chat"></i> 文本
                                </button>
                                <button type="button" class="btn btn-sm btn-outline-primary" data-message-type="question">
                                    <i class="bi bi-question-circle"></i> 问题
                                </button>
                                <button type="button" class="btn btn-sm btn-outline-primary" data-message-type="command">
                                    <i class="bi bi-code-slash"></i> 命令
                                </button>
                            </div>
                        </div>
                        
                        <div class="input-group">
                            <textarea class="form-control" id="messageInput" rows="2" placeholder="输入消息..."></textarea>
                            <button class="btn btn-primary" type="button" id="sendButton">
                                <i class="bi bi-send"></i> 发送
                            </button>
                        </div>
                        
                        <div class="form-check mt-2">
                            <input class="form-check-input" type="checkbox" id="useFlowCheckbox">
                            <label class="form-check-label" for="useFlowCheckbox">
                                使用流程处理消息
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-3">
                <div class="card mb-3">
                    <div class="card-header bg-primary text-white">
                        <h5 class="card-title mb-0">对话设置</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="modelSelect" class="form-label">选择模型</label>
                            <select class="form-select" id="modelSelect">
                                <option value="default" selected>默认模型</option>
                                <option value="deepseek">DeepSeek Chat</option>
                                <option value="gpt3">GPT-3.5 Turbo</option>
                                <option value="gpt4">GPT-4</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="temperatureRange" class="form-label">Temperature</label>
                            <input type="range" class="form-range" id="temperatureRange" min="0" max="2" step="0.1" value="0.7">
                            <div class="d-flex justify-content-between">
                                <small>精确</small>
                                <small>0.7</small>
                                <small>创意</small>
                            </div>
                        </div>
                        
                        <button class="btn btn-sm btn-outline-secondary w-100" id="clearChat">
                            <i class="bi bi-trash"></i> 清除对话
                        </button>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="card-title mb-0">使用的流程</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <select class="form-select" id="flowSelect">
                                <option value="none" selected>不使用流程</option>
                                <option value="general">通用对话流程</option>
                                <option value="customer">客服对话流程</option>
                                <option value="technical">技术支持流程</option>
                            </select>
                        </div>
                        
                        <div class="flow-info d-none" id="flowInfo">
                            <div class="mb-2">
                                <small class="text-muted">流程描述:</small>
                                <p id="flowDescription" class="mb-1">通用对话流程，适用于大多数会话场景。</p>
                            </div>
                            <a href="#" class="btn btn-sm btn-outline-primary" id="viewFlow">
                                <i class="bi bi-eye"></i> 查看流程图
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const messageTypeButtons = document.querySelectorAll('.message-type-selector .btn');
            const messageInput = document.getElementById('messageInput');
            const sendButton = document.getElementById('sendButton');
            const chatMessages = document.getElementById('chatMessages');
            const useFlowCheckbox = document.getElementById('useFlowCheckbox');
            const flowSelect = document.getElementById('flowSelect');
            const flowInfo = document.getElementById('flowInfo');
            const typingIndicator = document.getElementById('typingIndicator');
            
            let currentMessageType = 'text';
            let chatContext = {};
            
            // 消息类型切换
            messageTypeButtons.forEach(button => {
                button.addEventListener('click', function() {
                    messageTypeButtons.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');
                    currentMessageType = this.getAttribute('data-message-type');
                    messageInput.placeholder = `输入${currentMessageType === 'question' ? '问题' : currentMessageType === 'command' ? '命令' : '消息'}...`;
                });
            });
            
            // 流程选择更改
            flowSelect.addEventListener('change', function() {
                if (this.value !== 'none') {
                    flowInfo.classList.remove('d-none');
                    useFlowCheckbox.checked = true;
                } else {
                    flowInfo.classList.add('d-none');
                    useFlowCheckbox.checked = false;
                }
            });
            
            // 发送消息
            sendButton.addEventListener('click', sendMessage);
            messageInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            function sendMessage() {
                const messageText = messageInput.value.trim();
                if (!messageText) return;
                
                // 添加用户消息到聊天界面
                addMessage(messageText, 'user');
                
                // 清空输入框
                messageInput.value = '';
                
                // 显示输入指示器
                typingIndicator.style.display = 'block';
                
                // 发送消息到后端
                fetch('/api/send-message', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: messageText,
                        type: currentMessageType,
                        useFlow: useFlowCheckbox.checked,
                        context: chatContext
                    })
                })
                .then(response => response.json())
                .then(data => {
                    // 隐藏输入指示器
                    typingIndicator.style.display = 'none';
                    
                    // 添加系统回复到聊天界面
                    addMessage(data.reply, 'system');
                    
                    // 更新上下文
                    chatContext = data.context || {};
                })
                .catch(error => {
                    console.error('发送消息时出错:', error);
                    typingIndicator.style.display = 'none';
                    addMessage('<strong>错误:</strong> 消息发送失败，请稍后重试。', 'system');
                });
            }
            
            function addMessage(text, sender) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}-message`;
                
                const now = new Date();
                const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
                
                messageDiv.innerHTML = `
                    <div>${text}</div>
                    <span class="message-time">${timeStr}</span>
                `;
                
                chatMessages.appendChild(messageDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
            
            // 清除聊天按钮
            document.getElementById('clearChat').addEventListener('click', function() {
                if (confirm('确定要清除所有对话记录吗？')) {
                    chatMessages.innerHTML = `
                        <div class="message system-message">
                            <div>对话已重置，请输入新消息。</div>
                            <span class="message-time">${new Date().getHours().toString().padStart(2, '0')}:${new Date().getMinutes().toString().padStart(2, '0')}</span>
                        </div>
                    `;
                    chatContext = {};
                }
            });
        });
    </script>
</body>
</html>
