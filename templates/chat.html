<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniFlow - 聊天界面</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .chat-container {
            max-width: 100%;
            height: calc(100vh - 56px);
            margin: 0;
            border-radius: 0;
            box-shadow: none;
            display: flex;
            flex-direction: column;
        }

        .chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            background-color: #f8f9fa;
        }

        .chat-sidebar {
            width: 300px;
            background-color: #f8f9fa;
            border-left: 1px solid #dee2e6;
            padding: 15px;
            overflow-y: auto;
        }

        .message {
            position: relative;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 10px;
            max-width: 70%;
            word-break: break-word;
        }

        .user-message {
            background-color: #0d6efd;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 0;
        }

        .system-message {
            background-color: #e9ecef;
            color: #212529;
            margin-right: auto;
            border-bottom-left-radius: 0;
        }

        .message-time {
            display: block;
            font-size: 0.75rem;
            margin-top: 5px;
            opacity: 0.8;
        }

        .typing-indicator {
            padding: 10px 15px;
            background-color: #e9ecef;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            width: fit-content;
        }

        .typing-indicator span {
            height: 8px;
            width: 8px;
            float: left;
            margin: 0 1px;
            background-color: #9E9EA1;
            display: block;
            border-radius: 50%;
            opacity: 0.4;
            animation: typing 1s infinite;
        }

        .typing-indicator span:nth-of-type(1) { animation-delay: 0s; }
        .typing-indicator span:nth-of-type(2) { animation-delay: 0.15s; }
        .typing-indicator span:nth-of-type(3) { animation-delay: 0.3s; }

        @keyframes typing {
            0% { transform: translateY(0px); }
            35% { transform: translateY(-5px); }
            65% { transform: translateY(0px); }
        }

        .chat-header {
            padding: 10px 20px;
            background-color: #ffffff;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            align-items: center;
        }

        .chat-footer {
            padding: 15px;
            background-color: #ffffff;
            border-top: 1px solid #dee2e6;
        }

        .message-input-container {
            display: flex;
        }

        .message-input {
            resize: none;
            border-radius: 20px;
            padding: 10px 15px;
            max-height: 120px;
            min-height: 50px;
        }

        .send-button {
            margin-left: 10px;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message-type-selector {
            margin-bottom: 15px;
        }

        .flow-info {
            padding: 10px;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            margin-top: 10px;
            background-color: #ffffff;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-diagram-3"></i> OmniFlow
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="bi bi-diagram-2"></i> 流程编辑器</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/chat"><i class="bi bi-chat-dots"></i> 聊天界面</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/settings"><i class="bi bi-gear"></i> 设置</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="chat-container d-flex flex-row">
        <!-- 聊天主区域 -->
        <div class="chat-main flex-grow-1 d-flex flex-column">
            <!-- 聊天头部 -->
            <div class="chat-header">
                <h5 class="mb-0 me-auto">聊天界面</h5>
                <div class="message-type-selector btn-group btn-group-sm" role="group">
                    <button type="button" class="btn btn-outline-primary active" data-message-type="text">
                        <i class="bi bi-chat"></i> 文本
                    </button>
                    <button type="button" class="btn btn-outline-primary" data-message-type="question">
                        <i class="bi bi-question-circle"></i> 问题
                    </button>
                    <button type="button" class="btn btn-outline-primary" data-message-type="command">
                        <i class="bi bi-terminal"></i> 命令
                    </button>
                </div>
                <button id="clearChat" class="btn btn-sm btn-outline-danger ms-2">
                    <i class="bi bi-trash"></i> 清除对话
                </button>
            </div>

            <!-- 聊天消息区域 -->
            <div id="chatMessages" class="chat-messages">
                <div class="message system-message">
                    <div><strong>OmniFlow 助手</strong>: 欢迎使用OmniFlow聊天界面！我可以帮助您了解和使用OmniFlow的各项功能。请随时提问或进行对话。</div>
                    <span class="message-time">12:00</span>
                </div>

                <div id="typingIndicator" class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                    <div class="message-time">OmniFlow正在输入...</div>
                </div>
            </div>

            <!-- 聊天输入区域 -->
            <div class="chat-footer">
                <div class="message-input-container">
                    <textarea id="messageInput" class="form-control message-input" placeholder="输入消息..." rows="1"></textarea>
                    <button id="sendButton" class="btn btn-primary send-button">
                        <i class="bi bi-send"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- 聊天侧边栏 -->
        <div class="chat-sidebar">
            <div class="chat-settings">
                <h5>对话设置</h5>
                <hr>

                <div class="mb-3">
                    <label for="modelSelect" class="form-label">使用模型</label>
                    <select class="form-select" id="modelSelect">
                        <option value="default">默认模型</option>
                        <!-- 模型选项将由JS动态添加 -->
                    </select>
                </div>

                <div class="mb-3">
                    <label for="temperatureRange" class="form-label">回复创造性</label>
                    <input type="range" class="form-range" id="temperatureRange" min="0" max="1" step="0.1" value="0.7">
                    <div class="d-flex justify-content-between">
                        <small>精确</small>
                        <small>0.7</small>
                        <small>创造性</small>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="useFlowCheckbox">
                        <label class="form-check-label" for="useFlowCheckbox">使用流程处理消息</label>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="flowSelect" class="form-label">选择流程</label>
                    <select class="form-select" id="flowSelect">
                        <option value="none">不使用流程</option>
                        <!-- 流程选项将由JS动态添加 -->
                    </select>
                </div>

                <div id="flowInfo" class="flow-info d-none">
                    <div class="mb-2">
                        <strong>流程描述</strong>
                        <p id="flowDescription" class="mb-2 small">选择的流程</p>
                    </div>
                    <button id="viewFlow" class="btn btn-sm btn-outline-primary w-100">
                        <i class="bi bi-diagram-2"></i> 查看流程图
                    </button>
                </div>
            </div>

            <div class="mt-4 pt-2 border-top">
                <h5>提示</h5>
                <hr>
                <div class="list-group list-group-flush small">
                    <a href="#" class="list-group-item list-group-item-action p-2" onclick="addSuggestion(this.textContent); return false;">
                        OmniFlow是什么？
                    </a>
                    <a href="#" class="list-group-item list-group-item-action p-2" onclick="addSuggestion(this.textContent); return false;">
                        如何创建自定义流程？
                    </a>
                    <a href="#" class="list-group-item list-group-item-action p-2" onclick="addSuggestion(this.textContent); return false;">
                        我需要哪些API密钥？
                    </a>
                    <a href="#" class="list-group-item list-group-item-action p-2" onclick="addSuggestion(this.textContent); return false;">
                        可以给出一些流程示例吗？
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/chat.js"></script>
    <script>
        // 添加建议到输入框
        function addSuggestion(text) {
            const messageInput = document.getElementById('messageInput');
            if (messageInput) {
                messageInput.value = text;
                messageInput.focus();
            }
        }
        
        // 自适应文本框高度
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            const newHeight = Math.min(this.scrollHeight, 120);
            this.style.height = newHeight + 'px';
        });
    </script>
</body>
</html>
