<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniFlow - 流程编辑器</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/node_editor.css">
    <style>
        #flowCanvas {
            border: 1px solid #ddd;
            background-color: #f8f9fa;
            height: 600px;
            position: relative;
            overflow: hidden;
        }
        
        .node {
            position: absolute;
            width: 180px;
            height: 100px;
            background-color: white;
            border: 2px solid #3498db;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
            cursor: move;
        }
        
        .node-handle {
            width: 12px;
            height: 12px;
            background-color: #3498db;
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
        }
        
        .handle-input {
            top: 50%;
            left: -6px;
            transform: translateY(-50%);
        }
        
        .handle-output {
            top: 50%;
            right: -6px;
            transform: translateY(-50%);
        }
        
        .node-title {
            font-weight: bold;
            margin-bottom: 5px;
            user-select: none;
        }
        
        .node-type {
            font-size: 0.8em;
            color: #6c757d;
            user-select: none;
        }
        
        .connection {
            position: absolute;
            z-index: 5;
            pointer-events: none;
        }
        
        .toolbar {
            padding: 10px;
            margin-bottom: 15px;
            background-color: #f8f9fa;
            border-radius: 5px;
        }
        
        .node-palette {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 5px;
            background-color: white;
        }
        
        .node-template {
            margin-bottom: 10px;
            padding: 8px;
            background-color: #e9ecef;
            border-radius: 4px;
            cursor: grab;
            transition: background-color 0.2s;
        }
        
        .node-template:hover {
            background-color: #dee2e6;
        }
        
        #miniMap {
            border: 1px solid #ddd;
            width: 100%;
            height: 150px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">OmniFlow</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="bi bi-house"></i> 首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/node-editor"><i class="bi bi-diagram-3"></i> 流程编辑器</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/chat"><i class="bi bi-chat-dots"></i> 聊天界面</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/settings"><i class="bi bi-gear"></i> 系统设置</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-3">
        <div class="row">
            <!-- 左侧面板 -->
            <div class="col-md-3">
                <div class="card mb-3">
                    <div class="card-header bg-primary text-white">
                        <h5 class="card-title mb-0">节点库</h5>
                    </div>
                    <div class="card-body node-palette">
                        <div class="node-template" data-node-type="input">
                            <div class="node-title">输入节点</div>
                            <div class="node-type">用于接收输入数据</div>
                        </div>
                        <div class="node-template" data-node-type="process">
                            <div class="node-title">处理节点</div>
                            <div class="node-type">用于数据处理和转换</div>
                        </div>
                        <div class="node-template" data-node-type="decision">
                            <div class="node-title">决策节点</div>
                            <div class="node-type">用于条件判断和分支</div>
                        </div>
                        <div class="node-template" data-node-type="output">
                            <div class="node-title">输出节点</div>
                            <div class="node-type">用于输出结果</div>
                        </div>
                        <div class="node-template" data-node-type="api">
                            <div class="node-title">API调用节点</div>
                            <div class="node-type">调用外部API服务</div>
                        </div>
                        <div class="node-template" data-node-type="llm">
                            <div class="node-title">LLM节点</div>
                            <div class="node-type">调用大语言模型</div>
                        </div>
                    </div>
                </div>
                
                <div class="card mb-3">
                    <div class="card-header bg-primary text-white">
                        <h5 class="card-title mb-0">属性面板</h5>
                    </div>
                    <div class="card-body" id="propertiesPanel">
                        <p class="text-muted">选择一个节点来编辑其属性</p>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="card-title mb-0">导航</h5>
                    </div>
                    <div class="card-body">
                        <div id="miniMap" class="mini-map"></div>
                        <div class="mt-2">
                            <button class="btn btn-sm btn-outline-secondary" id="zoomIn">
                                <i class="bi bi-zoom-in"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" id="zoomOut">
                                <i class="bi bi-zoom-out"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" id="resetView">
                                <i class="bi bi-aspect-ratio"></i> 重置
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" id="fitContent">
                                <i class="bi bi-arrows-fullscreen"></i> 自适应
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 右侧主编辑区 -->
            <div class="col-md-9">
                <div class="toolbar">
                    <div class="btn-toolbar" role="toolbar">
                        <div class="btn-group me-2" role="group">
                            <button type="button" class="btn btn-outline-primary" id="newFlow">
                                <i class="bi bi-file"></i> 新建
                            </button>
                            <button type="button" class="btn btn-outline-primary" id="saveFlow">
                                <i class="bi bi-save"></i> 保存
                            </button>
                            <button type="button" class="btn btn-outline-primary" id="loadFlow">
                                <i class="bi bi-folder2-open"></i> 加载
                            </button>
                        </div>
                        <div class="btn-group me-2" role="group">
                            <button type="button" class="btn btn-outline-secondary" id="deleteSelected">
                                <i class="bi bi-trash"></i> 删除
                            </button>
                            <button type="button" class="btn btn-outline-secondary" id="duplicateSelected">
                                <i class="bi bi-copy"></i> 复制
                            </button>
                        </div>
                        <div class="btn-group" role="group">
                            <button type="button" class="btn btn-success" id="executeFlow">
                                <i class="bi bi-play"></i> 执行
                            </button>
                            <button type="button" class="btn btn-outline-info" id="validateFlow">
                                <i class="bi bi-check-circle"></i> 验证
                            </button>
                        </div>
                    </div>
                </div>
                
                <div id="flowCanvas" class="flow-canvas">
                    <!-- 节点和连接将动态添加到这里 -->
                </div>
                
                <div class="mt-3 p-2 bg-light border rounded">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="input-group">
                                <span class="input-group-text">流程名称</span>
                                <input type="text" class="form-control" id="flowName" placeholder="输入流程名称">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="d-flex justify-content-end">
                                <span class="me-3">节点: <span id="nodeCount">0</span></span>
                                <span>连接: <span id="connectionCount">0</span></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 保存流程模态框 -->
    <div class="modal fade" id="saveFlowModal" tabindex="-1" aria-labelledby="saveFlowModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="saveFlowModalLabel">保存流程</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="saveFlowName" class="form-label">流程名称</label>
                        <input type="text" class="form-control" id="saveFlowName">
                    </div>
                    <div class="mb-3">
                        <label for="saveFlowDesc" class="form-label">描述（可选）</label>
                        <textarea class="form-control" id="saveFlowDesc" rows="3"></textarea>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="saveAsNew">
                        <label class="form-check-label" for="saveAsNew">另存为新流程</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="confirmSave">保存</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 加载流程模态框 -->
    <div class="modal fade" id="loadFlowModal" tabindex="-1" aria-labelledby="loadFlowModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="loadFlowModalLabel">加载流程</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                </div>
                <div class="modal-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>流程名称</th>
                                    <th>创建日期</th>
                                    <th>节点数</th>
                                    <th>连接数</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="flowsList">
                                <!-- 流程列表将动态添加到这里 -->
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 节点编辑模态框 -->
    <div class="modal fade" id="nodeEditModal" tabindex="-1" aria-labelledby="nodeEditModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="nodeEditModalLabel">编辑节点</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                </div>
                <div class="modal-body">
                    <form id="nodeEditForm">
                        <div class="mb-3">
                            <label for="editNodeName" class="form-label">节点名称</label>
                            <input type="text" class="form-control" id="editNodeName">
                        </div>
                        <div class="mb-3">
                            <label for="editNodeDescription" class="form-label">描述</label>
                            <textarea class="form-control" id="editNodeDescription" rows="2"></textarea>
                        </div>
                        <div id="nodeTypeSpecificFields">
                            <!-- 不同节点类型特有的字段将动态添加到这里 -->
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="confirmNodeEdit">保存</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 流程执行模态框 -->
    <div class="modal fade" id="executeFlowModal" tabindex="-1" aria-labelledby="executeFlowModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="executeFlowModalLabel">执行流程</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <h6>输入参数</h6>
                        <div id="flowInputFields">
                            <!-- 流程输入字段将动态添加到这里 -->
                        </div>
                    </div>
                    <div class="mb-3">
                        <h6>执行结果</h6>
                        <div class="p-3 bg-light border rounded" id="flowExecutionResult">
                            <div class="text-center text-muted">请点击"执行"按钮运行流程</div>
                        </div>
                    </div>
                    <div class="progress mb-3 d-none" id="executionProgress">
                        <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    <button type="button" class="btn btn-primary" id="startExecution">执行</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/node_editor.js"></script>
</body>
</html>
