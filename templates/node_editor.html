<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniFlow - 流程编辑器</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/node_editor.css">
</head>
<body>
    <div class="container-fluid vh-100 d-flex flex-column p-0">
        <!-- 顶部导航栏 -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">
                    <i class="bi bi-diagram-3"></i>
                    OmniFlow
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="/"><i class="bi bi-house"></i> 主页</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="/node-editor"><i class="bi bi-diagram-2"></i> 流程编辑器</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/chat"><i class="bi bi-chat-dots"></i> 聊天</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/settings"><i class="bi bi-gear"></i> 设置</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        
        <!-- 主要内容区域 -->
        <div class="editor-container flex-grow-1 d-flex">
            <!-- 左侧节点面板 -->
            <div class="nodes-panel bg-light border-end p-2">
                <h6 class="text-muted mb-2">节点库</h6>
                
                <div class="node-group">
                    <h6 class="node-group-title">基础节点</h6>
                    <div class="node-template" data-node-type="input">
                        <i class="bi bi-box-arrow-in-down"></i>
                        <span>输入节点</span>
                    </div>
                    <div class="node-template" data-node-type="process">
                        <i class="bi bi-gear"></i>
                        <span>处理节点</span>
                    </div>
                    <div class="node-template" data-node-type="decision">
                        <i class="bi bi-shuffle"></i>
                        <span>决策节点</span>
                    </div>
                    <div class="node-template" data-node-type="output">
                        <i class="bi bi-box-arrow-up"></i>
                        <span>输出节点</span>
                    </div>
                </div>
                
                <div class="node-group">
                    <h6 class="node-group-title">高级节点</h6>
                    <div class="node-template" data-node-type="api">
                        <i class="bi bi-cloud"></i>
                        <span>API调用节点</span>
                    </div>
                    <div class="node-template" data-node-type="llm">
                        <i class="bi bi-cpu"></i>
                        <span>LLM节点</span>
                    </div>
                </div>
                
                <div class="stats p-2 mt-3 border-top">
                    <div class="d-flex justify-content-between">
                        <small>节点数量:</small>
                        <small id="nodeCount">0</small>
                    </div>
                    <div class="d-flex justify-content-between">
                        <small>连接数量:</small>
                        <small id="connectionCount">0</small>
                    </div>
                </div>
                
                <!-- 迷你地图 -->
                <div id="miniMap" class="mini-map mt-3 border">
                    <div class="mini-map-label">迷你地图</div>
                </div>
            </div>
            
            <!-- 中间画布区域 -->
            <div class="canvas-container position-relative flex-grow-1">
                <!-- 工具栏 -->
                <div class="toolbar bg-light border-bottom p-1 d-flex">
                    <div class="btn-group me-2">
                        <button id="newFlow" class="btn btn-sm btn-outline-secondary" title="新建流程">
                            <i class="bi bi-file-earmark"></i>
                        </button>
                        <button id="saveFlow" class="btn btn-sm btn-outline-secondary" title="保存流程">
                            <i class="bi bi-save"></i>
                        </button>
                        <button id="loadFlow" class="btn btn-sm btn-outline-secondary" title="加载流程">
                            <i class="bi bi-folder"></i>
                        </button>
                    </div>
                    
                    <div class="btn-group me-2">
                        <button id="deleteSelected" class="btn btn-sm btn-outline-secondary" title="删除选中项">
                            <i class="bi bi-trash"></i>
                        </button>
                        <button id="duplicateSelected" class="btn btn-sm btn-outline-secondary" title="复制选中项">
                            <i class="bi bi-files"></i>
                        </button>
                    </div>
                    
                    <div class="btn-group me-2">
                        <button id="zoomIn" class="btn btn-sm btn-outline-secondary" title="放大">
                            <i class="bi bi-zoom-in"></i>
                        </button>
                        <button id="zoomOut" class="btn btn-sm btn-outline-secondary" title="缩小">
                            <i class="bi bi-zoom-out"></i>
                        </button>
                        <button id="fitContent" class="btn btn-sm btn-outline-secondary" title="适应内容">
                            <i class="bi bi-fullscreen"></i>
                        </button>
                        <button id="resetView" class="btn btn-sm btn-outline-secondary" title="重置视图">
                            <i class="bi bi-arrow-counterclockwise"></i>
                        </button>
                    </div>
                    
                    <div class="btn-group me-2">
                        <button id="validateFlow" class="btn btn-sm btn-outline-secondary" title="验证流程">
                            <i class="bi bi-check-circle"></i>
                        </button>
                        <button id="executeFlow" class="btn btn-sm btn-success" title="执行流程">
                            <i class="bi bi-play"></i> 执行
                        </button>
                    </div>
                    
                    <div class="flow-name-container ms-auto">
                        <input type="text" id="flowName" class="form-control form-control-sm" placeholder="流程名称" value="">
                    </div>
                </div>
                
                <!-- 流程画布 -->
                <div id="flowCanvas" class="flow-canvas"></div>
                
                <!-- 状态栏 -->
                <div class="status-bar bg-light border-top p-1 d-flex justify-content-between">
                    <div class="status-message text-muted small">
                        准备就绪
                    </div>
                    <div class="view-info text-muted small">
                        缩放: <span id="zoomLevel">100%</span>
                    </div>
                </div>
            </div>
            
            <!-- 右侧属性面板 -->
            <div class="properties-panel bg-light border-start p-2">
                <h6 class="text-muted mb-2">属性</h6>
                <div id="propertiesPanel">
                    <div class="text-muted text-center">
                        <small>选择节点或连接以查看属性</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 保存流程模态框 -->
    <div class="modal fade" id="saveFlowModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">保存流程</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="saveFlowName" class="form-label">流程名称</label>
                            <input type="text" class="form-control" id="saveFlowName">
                        </div>
                        <div class="mb-3">
                            <label for="saveFlowDesc" class="form-label">描述</label>
                            <textarea class="form-control" id="saveFlowDesc" rows="3"></textarea>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="saveAsNew">
                            <label class="form-check-label" for="saveAsNew">
                                另存为新流程
                            </label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="confirmSave">保存</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 加载流程模态框 -->
    <div class="modal fade" id="loadFlowModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">加载流程</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>流程名称</th>
                                    <th>创建时间</th>
                                    <th>节点数</th>
                                    <th>连接数</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="flowsList">
                                <tr>
                                    <td colspan="5" class="text-center">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 编辑节点模态框 -->
    <div class="modal fade" id="nodeEditModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="nodeEditModalLabel">编辑节点</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="editNodeName" class="form-label">节点名称</label>
                            <input type="text" class="form-control" id="editNodeName">
                        </div>
                        <div class="mb-3">
                            <label for="editNodeDescription" class="form-label">描述</label>
                            <textarea class="form-control" id="editNodeDescription" rows="2"></textarea>
                        </div>
                        <hr>
                        <div id="nodeTypeSpecificFields">
                            <!-- 这里会动态添加不同节点类型的特定字段 -->
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="confirmNodeEdit">保存</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 执行流程模态框 -->
    <div class="modal fade" id="executeFlowModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">执行流程</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6">
                            <h6>输入参数</h6>
                            <div id="flowInputFields">
                                <!-- 这里会动态添加输入字段 -->
                            </div>
                        </div>
                        <div class="col-md-6">
                            <h6>执行结果</h6>
                            <div id="flowExecutionResult" class="border p-2" style="min-height: 200px;">
                                <div class="text-center text-muted">
                                    点击"执行"按钮开始流程
                                </div>
                            </div>
                            
                            <div id="executionProgress" class="progress mt-3 d-none">
                                <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    <button type="button" class="btn btn-primary" id="startExecution">执行</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 使用新的模块化加载器脚本 -->
    <script src="/static/js/node_editor_loader.js" type="module"></script>
</body>
</html>
