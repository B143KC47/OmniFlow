<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniFlow - 系统设置</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/settings.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">OmniFlow</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="bi bi-house"></i> 首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/node-editor"><i class="bi bi-diagram-3"></i> 流程编辑器</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/chat"><i class="bi bi-chat-dots"></i> 聊天界面</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/settings"><i class="bi bi-gear"></i> 系统设置</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="mb-4">系统设置</h1>
        
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="card-title mb-0"><i class="bi bi-key"></i> API 配置</h5>
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <div class="form-group mb-3">
                            <label for="deepseekApiKey" class="form-label">DeepSeek API 密钥</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="deepseekApiKey" placeholder="输入 DeepSeek API 密钥">
                                <button class="btn btn-outline-secondary toggle-password" type="button">
                                    <i class="bi bi-eye"></i>
                                </button>
                                <button class="btn btn-outline-primary" id="testDeepseekApi" type="button">测试连接</button>
                            </div>
                            <div class="form-text">用于访问 DeepSeek 大语言模型的 API 密钥</div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group mb-3">
                            <label for="openaiApiKey" class="form-label">OpenAI API 密钥</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="openaiApiKey" placeholder="输入 OpenAI API 密钥">
                                <button class="btn btn-outline-secondary toggle-password" type="button">
                                    <i class="bi bi-eye"></i>
                                </button>
                                <button class="btn btn-outline-primary" id="testOpenaiApi" type="button">测试连接</button>
                            </div>
                            <div class="form-text">用于访问 GPT 等 OpenAI 模型的 API 密钥</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="card-title mb-0"><i class="bi bi-cpu"></i> 模型配置</h5>
            </div>
            <div class="card-body">
                <div class="form-group mb-3">
                    <label class="form-label">默认使用的模型</label>
                    <div class="model-options" id="modelOptions">
                        <!-- 动态加载模型选项 -->
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">模型参数设置</label>
                    <div class="row">
                        <div class="col-md-6 col-lg-4 mb-3">
                            <label for="temperature" class="form-label">Temperature</label>
                            <div class="input-group">
                                <input type="range" class="form-range" id="temperature" min="0" max="2" step="0.1" value="0.7">
                                <span id="temperatureValue" class="ms-2">0.7</span>
                            </div>
                            <div class="form-text">控制输出的随机性，值越高结果越多样化</div>
                        </div>
                        <div class="col-md-6 col-lg-4 mb-3">
                            <label for="maxTokens" class="form-label">最大 Token 数</label>
                            <input type="number" class="form-control" id="maxTokens" value="2048" min="1" max="8192">
                            <div class="form-text">限制模型输出的最大长度</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="d-flex justify-content-between mb-4">
            <button id="resetSettings" class="btn btn-outline-danger">
                <i class="bi bi-arrow-counterclockwise"></i> 重置设置
            </button>
            <button id="saveSettings" class="btn btn-primary">
                <i class="bi bi-save"></i> 保存设置
            </button>
        </div>

        <div id="settingsAlerts">
            <!-- 这里会显示提示信息 -->
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/settings.js"></script>
</body>
</html>
